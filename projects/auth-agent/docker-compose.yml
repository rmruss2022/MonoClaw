version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: authagent-postgres
    environment:
      POSTGRES_USER: authagent
      POSTGRES_PASSWORD: authagent
      POSTGRES_DB: authagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authagent"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: authagent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    container_name: authagent-api
    ports:
      - "3011:3011"
    environment:
      DATABASE_URL: postgresql://authagent:authagent@postgres:5432/authagent
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-your_key_here}
      PORT: 3011
      DEMO_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/api/src:/app/src
      - ./data:/app/data
      - uploads:/app/uploads

  ui:
    build:
      context: ./packages/ui
      dockerfile: Dockerfile
    container_name: authagent-ui
    ports:
      - "3010:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3011
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
