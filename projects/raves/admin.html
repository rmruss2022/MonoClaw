<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GROUNDFLOOR ADMIN</title>
<style>
  :root {
    --bg: #0C0C0C;
    --surface: #141414;
    --surface-plus: #1C1C1C;
    --border: #2A2A2A;
    --border-plus: #3A3A3A;
    --text: #F0EEE9;
    --text-2: #888888;
    --text-3: #444444;
    --accent: #E8FF41;
    --accent-dim: #B8CC2E;
    --danger: #FF4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); }
  body {
    font-family: system-ui, -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 0;
  }

  a { color: var(--accent); text-decoration: none; }

  /* ---------- HEADER ---------- */
  header.site {
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .brand {
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
  }
  .brand .accent { color: var(--accent); }
  .brand-sub {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-top: 4px;
  }
  .uptime {
    display: flex;
    gap: 32px;
    align-items: baseline;
  }
  .uptime .label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-3);
  }
  .uptime .value {
    font-size: 20px;
    font-weight: 900;
    color: var(--accent);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .uptime .value.neutral { color: var(--text); }

  /* ---------- LAYOUT ---------- */
  main {
    padding: 32px;
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    gap: 32px;
  }

  section.panel {
    border: 1px solid var(--border);
    background: var(--surface);
  }
  section.panel > h2 {
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  section.panel > h2 .count {
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  /* ---------- STATS GRID ---------- */
  .stat-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    border-top: 1px solid var(--border);
  }
  .stat-row:first-child { border-top: 0; }
  .stat-cell {
    padding: 18px 20px;
    border-right: 1px solid var(--border);
  }
  .stat-cell:last-child { border-right: 0; }
  .stat-cell .label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-3);
  }
  .stat-cell .value {
    font-size: 22px;
    font-weight: 900;
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .stat-cell .value.accent { color: var(--accent); }
  .stat-cell .sub {
    font-size: 10px;
    color: var(--text-3);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ---------- JOB LIST ---------- */
  .jobs {
    display: grid;
    grid-template-columns: 1fr;
  }
  .job {
    display: grid;
    grid-template-columns: minmax(180px, 1.4fr) minmax(140px, 1fr) minmax(180px, 1.6fr) minmax(160px, 1fr) auto;
    gap: 24px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .job:last-child { border-bottom: 0; }
  .job .cell-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-3);
    margin-bottom: 4px;
  }
  .job .job-name {
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
  }
  .job .job-schedule {
    font-size: 11px;
    color: var(--text-2);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .job .mono {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 11px;
    color: var(--text);
  }
  .job .meta-line {
    font-size: 11px;
    color: var(--text-2);
    margin-top: 2px;
  }
  .job .run-count {
    font-weight: 900;
    font-size: 18px;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  .status-pill {
    display: inline-block;
    padding: 2px 8px;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--border-plus);
    color: var(--text-2);
  }
  .status-pill.success { color: var(--accent); border-color: var(--accent-dim); }
  .status-pill.failed { color: var(--danger); border-color: var(--danger); }
  .status-pill.skipped { color: var(--text-2); }
  .status-pill.never { color: var(--text-3); border-color: var(--border); }

  /* ---------- BUTTONS ---------- */
  button, .btn {
    font-family: inherit;
    background: var(--accent);
    color: #000;
    border: 0;
    padding: 10px 16px;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 0;
    transition: background 120ms ease-out;
  }
  button:hover { background: var(--accent-dim); }
  button:disabled { background: var(--surface-plus); color: var(--text-3); cursor: not-allowed; }
  button.secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border-plus);
  }
  button.secondary:hover { border-color: var(--text); background: transparent; }

  /* ---------- RUN HISTORY ---------- */
  .history {
    max-height: 480px;
    overflow-y: auto;
  }
  .history-row {
    display: grid;
    grid-template-columns: 160px 180px 96px 1fr;
    gap: 16px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    font-size: 11px;
  }
  .history-row.head {
    background: var(--bg);
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 9px;
    font-weight: 800;
    position: sticky;
    top: 0;
  }
  .history-row .when {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    color: var(--text-2);
  }
  .history-row .job {
    color: var(--text);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 10px;
  }
  .history-row .details {
    color: var(--text-2);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-row.empty { color: var(--text-3); padding: 24px 20px; }
  .history-row.empty td { text-align: center; }

  /* ---------- TOAST ---------- */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--accent-dim);
    color: var(--text);
    padding: 12px 16px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 800;
    z-index: 10;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 160ms ease-out, transform 160ms ease-out;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  /* ---------- REFRESH BAR ---------- */
  .refresh-bar {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-3);
    padding: 8px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }

  /* ---------- LOADING LINE ---------- */
  .loader {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: transparent;
    overflow: hidden;
    z-index: 20;
  }
  .loader.active::after {
    content: '';
    display: block;
    height: 1px;
    width: 30%;
    background: var(--accent);
    animation: sweep 800ms linear infinite;
  }
  @keyframes sweep {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(400%); }
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 900px) {
    main { padding: 20px; }
    header.site { padding: 18px 20px; }
    .job {
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .history-row { grid-template-columns: 1fr; gap: 4px; }
    .history-row.head { display: none; }
  }
</style>
</head>
<body>

<div class="loader" id="loader"></div>

<header class="site">
  <div>
    <div class="brand">GROUNDFLOOR <span class="accent">ADMIN</span></div>
    <div class="brand-sub">In-process scheduler · System telemetry</div>
  </div>
  <div class="uptime">
    <div>
      <div class="label">Server Uptime</div>
      <div class="value neutral" id="uptime">—</div>
    </div>
    <div>
      <div class="label">Now (ET)</div>
      <div class="value neutral" id="now-et">—</div>
    </div>
  </div>
</header>

<main>
  <section class="panel">
    <h2>System <span class="count" id="stats-count"></span></h2>
    <div class="stat-row" id="stats-grid">
      <div class="stat-cell"><div class="label">Loading…</div></div>
    </div>
  </section>

  <section class="panel">
    <h2>Scheduler Jobs <span class="count" id="jobs-count"></span></h2>
    <div class="jobs" id="jobs">
      <div class="job"><div class="cell-label">Loading…</div></div>
    </div>
  </section>

  <section class="panel">
    <h2>Run History <span class="count" id="history-count"></span></h2>
    <div class="history" id="history">
      <div class="history-row head">
        <div>When (UTC)</div>
        <div>Job</div>
        <div>Status</div>
        <div>Details</div>
      </div>
      <div class="history-row empty">Loading…</div>
    </div>
    <div class="refresh-bar">
      <span id="refresh-status">Auto-refresh every 30s</span>
      <button class="secondary" style="padding: 4px 10px; font-size: 9px;" onclick="refresh(true)">Refresh now</button>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);

function fmtUptime(sec) {
  if (sec < 60) return `${sec}s`;
  const m = Math.floor(sec / 60), s = sec % 60;
  if (m < 60) return `${m}m ${s}s`;
  const h = Math.floor(m / 60), mm = m % 60;
  if (h < 24) return `${h}h ${mm}m`;
  const d = Math.floor(h / 24), hh = h % 24;
  return `${d}d ${hh}h`;
}

function fmtBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1024 / 1024).toFixed(2) + ' MB';
}

function fmtTimeShort(iso) {
  if (!iso) return '—';
  const d = new Date(iso + (iso.endsWith('Z') || iso.includes('T') ? '' : 'Z'));
  if (isNaN(d.getTime())) return iso;
  const pad = n => String(n).padStart(2, '0');
  return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())} ${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}`;
}

function toast(msg, isError) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.toggle('error', !!isError);
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2400);
}

function setLoading(on) {
  $('#loader').classList.toggle('active', !!on);
}

async function refresh(showToast) {
  setLoading(true);
  try {
    const [sched, stats] = await Promise.all([
      fetch('/api/admin/scheduler').then(r => r.json()),
      fetch('/api/admin/stats').then(r => r.json())
    ]);
    renderStats(stats);
    renderScheduler(sched);
    $('#refresh-status').textContent = `Auto-refresh every 30s · last: ${new Date().toLocaleTimeString()}`;
    if (showToast) toast('Refreshed');
  } catch (e) {
    toast('Refresh failed: ' + e.message, true);
  } finally {
    setLoading(false);
  }
}

function renderStats(s) {
  $('#uptime').textContent = fmtUptime(s.uptimeSec || 0);
  const grid = $('#stats-grid');
  const cells = [
    { label: 'Events',         value: s.events ?? '—' },
    { label: 'Upcoming',       value: s.upcoming ?? 0, accent: true },
    { label: 'Going',          value: s.going ?? 0,    accent: true },
    { label: 'Attended',       value: s.attended ?? 0 },
    { label: 'Users',          value: s.users ?? 0 },
    { label: 'Push Subs',      value: s.pushSubscriptions ?? 0, accent: (s.pushSubscriptions || 0) > 0 },
    { label: 'DB Size',        value: fmtBytes(s.dbBytes || 0) },
    { label: 'Node',           value: s.nodeVersion || '—' }
  ];
  grid.innerHTML = cells.map(c => `
    <div class="stat-cell">
      <div class="label">${c.label}</div>
      <div class="value ${c.accent ? 'accent' : ''}">${c.value}</div>
    </div>
  `).join('');
}

function statusPill(status) {
  if (!status) return '<span class="status-pill never">Never</span>';
  return `<span class="status-pill ${status}">${status}</span>`;
}

function renderScheduler(s) {
  if (s.nowET) {
    $('#now-et').textContent = `${s.nowET.date} ${String(s.nowET.hour).padStart(2,'0')}:${String(s.nowET.minute).padStart(2,'0')} ${s.nowET.dayOfWeek.slice(0,3)}`;
  }
  $('#jobs-count').textContent = (s.jobs || []).length;

  $('#jobs').innerHTML = (s.jobs || []).map(j => `
    <div class="job">
      <div>
        <div class="job-name">${j.label}</div>
        <div class="job-schedule">${j.description}</div>
      </div>
      <div>
        <div class="cell-label">Run Count</div>
        <div class="run-count">${j.runCount}</div>
        <div class="meta-line">${j.successCount}✓ ${j.skippedCount}⊘ ${j.failureCount}✕</div>
      </div>
      <div>
        <div class="cell-label">Last Run</div>
        <div class="mono">${j.lastRun ? fmtTimeShort(j.lastRun.ranAt) + ' UTC' : '—'}</div>
        <div class="meta-line">${j.lastRun ? statusPill(j.lastRun.status) + ' ' + escapeHtml(j.lastRun.details || '') : statusPill(null)}</div>
      </div>
      <div>
        <div class="cell-label">Next Run</div>
        <div class="mono">${j.nextRun || '—'}</div>
      </div>
      <div>
        <button data-job="${j.name}" onclick="runNow('${j.name}', this)">Run Now</button>
      </div>
    </div>
  `).join('');

  const hist = s.history || [];
  $('#history-count').textContent = hist.length;
  const body = hist.length ? hist.map(h => `
    <div class="history-row">
      <div class="when">${fmtTimeShort(h.ran_at)} UTC</div>
      <div class="job">${h.job_name}</div>
      <div>${statusPill(h.status)}</div>
      <div class="details" title="${escapeAttr(h.details || '')}">${escapeHtml(h.details || '—')}</div>
    </div>
  `).join('') : '<div class="history-row empty">No runs recorded yet</div>';

  $('#history').innerHTML = `
    <div class="history-row head">
      <div>When (UTC)</div>
      <div>Job</div>
      <div>Status</div>
      <div>Details</div>
    </div>
    ${body}
  `;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/'/g, '&#39;'); }

async function runNow(jobName, btn) {
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = 'Running…';
  try {
    const r = await fetch(`/api/admin/scheduler/${jobName}/run`, { method: 'POST' }).then(r => r.json());
    if (r.success) {
      toast(`${jobName} → ${r.result?.status || 'ok'}`);
    } else {
      toast(`Error: ${r.error || 'unknown'}`, true);
    }
  } catch (e) {
    toast('Run failed: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
    refresh();
  }
}

refresh();
setInterval(refresh, 30 * 1000);
</script>
</body>
</html>
