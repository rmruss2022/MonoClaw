<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>The Circle 🌀</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c26;
      --border: #2a2a38;
      --gold: #c9a84c;
      --gold-dim: rgba(201, 168, 76, 0.15);
      --text: #e8e8f0;
      --text-dim: #7a7a9a;
      --text-muted: #4a4a6a;
      --red: #e05c5c;
      --radius: 16px;
      --radius-sm: 10px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    /* HEADER */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 16px 12px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .header-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .header-count {
      font-size: 13px;
      color: var(--text-dim);
      background: var(--surface2);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .search-wrap {
      position: relative;
    }

    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px 10px 38px;
      font-size: 16px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .search-input:focus {
      border-color: var(--gold);
    }

    .search-input::placeholder { color: var(--text-muted); }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
      pointer-events: none;
    }

    /* PEOPLE LIST */
    .list {
      padding: 12px 16px 100px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 80px 24px;
    }

    .empty-emoji { font-size: 56px; margin-bottom: 16px; }

    .empty-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .empty-sub {
      font-size: 15px;
      color: var(--text-dim);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .empty-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold);
      color: #0a0a0f;
      font-weight: 700;
      font-size: 16px;
      padding: 14px 28px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
    }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .card:active { opacity: 0.85; }
    .card.expanded { border-color: var(--gold); }

    .card-main {
      padding: 14px 16px;
    }

    .card-row1 {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .card-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .card-contact {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .contact-tap {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .contact-tap:active { opacity: 0.7; }

    .card-vibe {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .card-vibe.truncated {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-play {
      font-size: 14px;
      color: var(--gold);
      line-height: 1.5;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .card-play.truncated {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .play-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.6;
      margin-bottom: 3px;
    }

    .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 8px;
    }

    .tag {
      background: var(--gold-dim);
      color: var(--gold);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    .card-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* EXPANDED ACTIONS */
    .card-actions {
      display: none;
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      gap: 8px;
    }

    .card.expanded .card-actions {
      display: flex;
    }

    .btn {
      flex: 1;
      padding: 11px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-edit {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-delete {
      background: rgba(224,92,92,0.12);
      color: var(--red);
      border: 1px solid rgba(224,92,92,0.2);
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 20px;
      z-index: 100;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: var(--gold);
      color: #0a0a0f;
      font-size: 28px;
      font-weight: 300;
      line-height: 1;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(201,168,76,0.4);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s;
    }

    .fab:active { transform: scale(0.93); }

    /* MODAL OVERLAY */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 150;
      display: none;
      align-items: flex-end;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      padding: 0 0 env(safe-area-inset-bottom, 20px);
      animation: slideUp 0.25s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface2);
      border: none;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-dim);
    }

    .field label.gold { color: var(--gold); }

    .field input, .field textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 16px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      resize: none;
    }

    .field input:focus, .field textarea:focus {
      border-color: var(--gold);
    }

    .field input::placeholder, .field textarea::placeholder {
      color: var(--text-muted);
      font-size: 14px;
    }

    .field textarea { min-height: 80px; }

    .field.play-field input, .field.play-field textarea {
      border-color: rgba(201,168,76,0.3);
      color: var(--gold);
    }

    .field.play-field input:focus, .field.play-field textarea:focus {
      border-color: var(--gold);
    }

    .tags-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px;
      min-height: 24px;
    }

    .save-btn {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      color: #0a0a0f;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 4px;
      -webkit-tap-highlight-color: transparent;
    }

    .save-btn:active { opacity: 0.85; }
    .save-btn:disabled { opacity: 0.5; }

    /* CONFIRM DIALOG */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .confirm-overlay.open { display: flex; }

    .confirm-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 320px;
      text-align: center;
    }

    .confirm-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .confirm-sub {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    .confirm-btns {
      display: flex;
      gap: 10px;
    }

    .confirm-cancel {
      flex: 1;
      padding: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .confirm-delete {
      flex: 1;
      padding: 12px;
      background: var(--red);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    /* Swipe hint line at top of modal */
    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 10px auto 4px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }
  
    .field-row { display: flex; gap: 10px; }
    .field-half { flex: 1; }
    .field-half label { display: block; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    input[type="date"], input[type="time"] { 
      width: 100%; background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); 
      border-radius: 8px; padding: 12px; color: #e0e0e0; font-size: 16px;
      box-sizing: border-box;
      color-scheme: dark;
    }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-top">
    <div class="header-title">The Circle 🌀</div>
    <div class="header-count" id="count">0 people</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input
      class="search-input"
      type="search"
      id="search"
      placeholder="Search people, vibes, tags..."
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    >
  </div>
</header>

<!-- PEOPLE LIST -->
<div class="list" id="list">
  <div class="loading">Loading...</div>
</div>

<!-- FAB -->
<button class="fab" id="fab" aria-label="Add person">+</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add to The Circle</div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Name *</label>
        <input type="text" id="f-name" placeholder="Who'd you meet?" autocomplete="off">
      </div>
      <div class="field">
        <label>Contact</label>
        <input type="text" id="f-contact" placeholder="@handle, number, email — whatever" autocomplete="off">
      </div>
      <div class="field">
        <label>Vibe</label>
        <textarea id="f-vibe" placeholder="DJ, throws warehouse parties in Bushwick, knows everyone worth knowing"></textarea>
      </div>
      <div class="field play-field">
        <label class="gold">⚡ The Play</label>
        <textarea id="f-play" placeholder="Intro to their venue network, potential collab on the event series"></textarea>
      </div>
      <div class="field">
        <label>Tags</label>
        <input type="text" id="f-tags" placeholder="dj, promoter, photographer" autocomplete="off">
        <div class="tags-preview" id="tags-preview"></div>
      </div>
      <div class="field">
        <label>Where you met</label>
        <input type="text" id="f-met" placeholder="Output, the Williamsburg flea, Jade's studio..." autocomplete="off">
      </div>
      <div class="field field-row">
        <div class="field-half">
          <label>Date met</label>
          <input type="date" id="f-met-date" autocomplete="off">
        </div>
        <div class="field-half">
          <label>Time</label>
          <input type="time" id="f-met-time" autocomplete="off">
        </div>
      </div>
      <button class="save-btn" id="saveBtn">Save to Circle</button>
    </div>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title">Remove from The Circle?</div>
    <div class="confirm-sub" id="confirmName">This can't be undone.</div>
    <div class="confirm-btns">
      <button class="confirm-cancel" id="confirmCancel">Keep</button>
      <button class="confirm-delete" id="confirmDelete">Remove</button>
    </div>
  </div>
</div>

<script>
const API = '/api/people';
let allPeople = [];
let searchDebounce;
let editingId = null;
let pendingDeleteId = null;
let expandedIds = new Set();

// ─── RENDER ─────────────────────────────────────────────────────────────

function formatMetDatetime(iso) {
  if (!iso) return null;
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
      + ' at ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  } catch(e) { return iso; }
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function parseTags(str) {
  if (!str) return [];
  return str.split(',').map(t => t.trim()).filter(Boolean);
}

function detectContact(contact) {
  if (!contact) return null;
  const c = contact.trim();
  if (c.startsWith('@')) return { type: 'ig', label: c };
  if (/^[\+\d\s\-\(\)]{7,}$/.test(c)) return { type: 'phone', label: c };
  if (c.includes('@') && c.includes('.')) return { type: 'email', label: c };
  return { type: 'other', label: c };
}

function renderContact(contact) {
  const info = detectContact(contact);
  if (!info) return '';
  const icon = info.type === 'ig' ? '📷' : info.type === 'phone' ? '📞' : info.type === 'email' ? '✉️' : '🔗';
  return `<span class="contact-tap" data-contact="${escHtml(contact)}" onclick="handleContact(event, '${escAttr(contact)}')">${icon} ${escHtml(info.label)}</span>`;
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) {
  return String(s || '').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

function renderCard(p) {
  const expanded = expandedIds.has(p.id);
  const tags = parseTags(p.tags);
  const tagsHtml = tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
  const loc = p.met_at ? escHtml(p.met_at) : '';
  const metDt = p.met_datetime ? formatMetDatetime(p.met_datetime) : '';
  const metInfo = [loc, metDt].filter(Boolean).join(' · ');
  const added = formatDate(p.created_at);

  return `
    <div class="card ${expanded ? 'expanded' : ''}" id="card-${p.id}" onclick="toggleCard(${p.id})">
      <div class="card-main">
        <div class="card-row1">
          <div class="card-name">${escHtml(p.name)}</div>
        </div>
        ${p.contact ? `<div class="card-contact">${renderContact(p.contact)}</div>` : ''}
        ${p.vibe ? `<div class="card-vibe ${expanded ? '' : 'truncated'}">${escHtml(p.vibe)}</div>` : ''}
        ${p.the_play ? `
          <div class="play-label">The Play</div>
          <div class="card-play ${expanded ? '' : 'truncated'}">${escHtml(p.the_play)}</div>
        ` : ''}
        ${tagsHtml ? `<div class="tags-row">${tagsHtml}</div>` : ''}
        <div class="card-meta">${metInfo ? metInfo + ' · ' : ''}Added ${added}</div>
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="btn btn-edit" onclick="openEdit(${p.id})">✏️ Edit</button>
        <button class="btn btn-delete" onclick="askDelete(${p.id}, '${escAttr(p.name)}')">🗑 Remove</button>
      </div>
    </div>
  `;
}

function renderList(people) {
  const list = document.getElementById('list');
  const count = document.getElementById('count');
  count.textContent = `${allPeople.length} ${allPeople.length === 1 ? 'person' : 'people'}`;

  if (people.length === 0 && allPeople.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-emoji">🌀</div>
        <div class="empty-title">No one in your circle yet.</div>
        <div class="empty-sub">Start adding people you meet.<br>The Play is what makes it useful.</div>
        <button class="empty-btn" onclick="openAdd()">＋ Add someone</button>
      </div>
    `;
    return;
  }

  if (people.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-emoji">🔍</div>
        <div class="empty-title">No matches.</div>
        <div class="empty-sub">Try a different name, tag, or vibe.</div>
      </div>
    `;
    return;
  }

  list.innerHTML = people.map(renderCard).join('');
}

// ─── DATA ────────────────────────────────────────────────────────────────

async function loadPeople() {
  try {
    const res = await fetch(API);
    allPeople = await res.json();
    renderList(allPeople);
  } catch(e) {
    document.getElementById('list').innerHTML = '<div class="empty"><div class="empty-title">Couldn\'t connect to server.</div></div>';
  }
}

async function savePerson() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('Name is required.'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  const payload = {
    name,
    contact: document.getElementById('f-contact').value.trim(),
    vibe: document.getElementById('f-vibe').value.trim(),
    the_play: document.getElementById('f-play').value.trim(),
    tags: document.getElementById('f-tags').value.trim(),
    met_at: document.getElementById('f-met').value.trim(),
    met_datetime: (() => {
      const d = document.getElementById('f-met-date').value;
      const t = document.getElementById('f-met-time').value;
      if (d && t) return d + 'T' + t;
      if (d) return d + 'T00:00';
      return null;
    })(),
  };

  try {
    let res;
    if (editingId) {
      res = await fetch(`${API}/${editingId}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    } else {
      res = await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    }
    const person = await res.json();
    closeModal();
    await loadPeople();
    if (editingId) {
      expandedIds.add(editingId);
      renderList(allPeople);
    }
    showToast(editingId ? `${person.name} updated ✓` : `${person.name} added to The Circle ✓`);
  } catch(e) {
    showToast('Error saving. Try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save to Circle';
  }
}

async function deletePerson(id) {
  try {
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    expandedIds.delete(id);
    await loadPeople();
    showToast('Removed from The Circle.');
  } catch(e) {
    showToast('Error removing. Try again.');
  }
}

// ─── SEARCH ──────────────────────────────────────────────────────────────

document.getElementById('search').addEventListener('input', (e) => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      renderList(allPeople);
      return;
    }
    const filtered = allPeople.filter(p =>
      [p.name, p.vibe, p.tags, p.met_at, p.the_play, p.contact]
        .some(f => f && f.toLowerCase().includes(q))
    );
    renderList(filtered);
  }, 200);
});

// ─── CARD INTERACTIONS ───────────────────────────────────────────────────

function toggleCard(id) {
  if (expandedIds.has(id)) {
    expandedIds.delete(id);
  } else {
    expandedIds.add(id);
  }
  // Re-render just the affected card
  const person = allPeople.find(p => p.id === id);
  if (!person) return;
  const el = document.getElementById(`card-${id}`);
  if (!el) return;
  el.outerHTML = renderCard(person);
}

function handleContact(e, contact) {
  e.stopPropagation();
  const c = contact.trim();
  if (c.startsWith('@')) {
    navigator.clipboard.writeText(c).then(() => showToast(`Copied ${c}`)).catch(() => showToast(c));
  } else if (c.includes('@') && c.includes('.')) {
    window.location.href = `mailto:${c}`;
  } else if (/^[\+\d\s\-\(\)]{7,}$/.test(c)) {
    window.location.href = `tel:${c.replace(/\s/g,'')}`;
  } else {
    navigator.clipboard.writeText(c).then(() => showToast(`Copied`)).catch(() => {});
  }
}

// ─── MODAL ───────────────────────────────────────────────────────────────

function openAdd() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add to The Circle';
  clearForm();
  openModal();
}

function openEdit(id) {
  const p = allPeople.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit';
  document.getElementById('f-name').value = p.name || '';
  document.getElementById('f-contact').value = p.contact || '';
  document.getElementById('f-vibe').value = p.vibe || '';
  document.getElementById('f-play').value = p.the_play || '';
  document.getElementById('f-tags').value = p.tags || '';
  document.getElementById('f-met').value = p.met_at || '';
  if (p.met_datetime) {
    const parts = p.met_datetime.split('T');
    document.getElementById('f-met-date').value = parts[0] || '';
    document.getElementById('f-met-time').value = parts[1]?.slice(0,5) || '';
  }
  updateTagsPreview(p.tags || '');
  openModal();
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 300);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function clearForm() {
  ['f-name','f-contact','f-vibe','f-play','f-tags','f-met','f-met-date','f-met-time'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('tags-preview').innerHTML = '';
}

// Live tags preview
document.getElementById('f-tags').addEventListener('input', (e) => {
  updateTagsPreview(e.target.value);
});

function updateTagsPreview(val) {
  const tags = parseTags(val);
  document.getElementById('tags-preview').innerHTML = tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('fab').addEventListener('click', openAdd);
document.getElementById('saveBtn').addEventListener('click', savePerson);

// Enter key in name field
document.getElementById('f-name').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('f-contact').focus();
});

// ─── CONFIRM DELETE ──────────────────────────────────────────────────────

function askDelete(id, name) {
  pendingDeleteId = id;
  document.getElementById('confirmName').textContent = `Remove "${name}" from The Circle?`;
  document.getElementById('confirmOverlay').classList.add('open');
}

document.getElementById('confirmCancel').addEventListener('click', () => {
  pendingDeleteId = null;
  document.getElementById('confirmOverlay').classList.remove('open');
});

document.getElementById('confirmDelete').addEventListener('click', () => {
  if (pendingDeleteId) {
    deletePerson(pendingDeleteId);
    pendingDeleteId = null;
  }
  document.getElementById('confirmOverlay').classList.remove('open');
});

// ─── TOAST ───────────────────────────────────────────────────────────────

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── SWIPE TO DELETE ─────────────────────────────────────────────────────

let touchStartX = 0;
let touchStartY = 0;

document.getElementById('list').addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.getElementById('list').addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 80 && Math.abs(dy) < 40 && dx < 0) {
    // Swipe left — find which card
    const card = e.target.closest('.card');
    if (card) {
      const id = parseInt(card.id.replace('card-', ''));
      const p = allPeople.find(x => x.id === id);
      if (p) askDelete(id, p.name);
    }
  }
}, { passive: true });

// ─── INIT ─────────────────────────────────────────────────────────────────

loadPeople();
</script>
</body>
